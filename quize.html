<!DOCTYPE html>
<html>
<head>
<title>Simple Quiz App</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.quiz-container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 15px gray;
}

h2{
    text-align:center;
}

ul{
    list-style:none;
    padding:0;
}

li{
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0077ff;
}

.result{
    text-align:center;
    font-size:20px;
}
</style>

</head>

<body>

<div class="quiz-container">

<h2>Simple Quiz Application</h2>

<div id="quiz">

<h3 id="question">Question</h3>

<ul>
<li><input type="radio" name="answer" value="a"> <span id="a_text"></span></li>
<li><input type="radio" name="answer" value="b"> <span id="b_text"></span></li>
<li><input type="radio" name="answer" value="c"> <span id="c_text"></span></li>
<li><input type="radio" name="answer" value="d"> <span id="d_text"></span></li>
</ul>

<button onclick="nextQuestion()">Next</button>

</div>

</div>

<script>

const quizData = [
{
question:"Which language is used for web pages?",
a:"HTML",
b:"Python",
c:"Java",
d:"C++",
correct:"a"
},
{
question:"Which company developed JavaScript?",
a:"Google",
b:"Microsoft",
c:"Netscape",
d:"IBM",
correct:"c"
},
{
question:"Which tag is used for images in HTML?",
a:"<img>",
b:"<image>",
c:"<pic>",
d:"<photo>",
correct:"a"
},
{
question:"CSS is used for?",
a:"Database",
b:"Styling web pages",
c:"Server",
d:"Operating system",
correct:"b"
}
];

let currentQuestion = 0;
let score = 0;

function loadQuiz(){

let q = quizData[currentQuestion];

document.getElementById("question").innerText = q.question;
document.getElementById("a_text").innerText = q.a;
document.getElementById("b_text").innerText = q.b;
document.getElementById("c_text").innerText = q.c;
document.getElementById("d_text").innerText = q.d;

}

function getAnswer(){

let answers = document.getElementsByName("answer");

for(let answer of answers){
if(answer.checked){
return answer.value;
}
}

return null;

}

function nextQuestion(){

let answer = getAnswer();

if(answer){
if(answer === quizData[currentQuestion].correct){
score++;
}

currentQuestion++;

if(currentQuestion < quizData.length){
loadQuiz();
}else{
document.getElementById("quiz").innerHTML =
"<div class='result'>🎉 Your Score: "+score+" / "+quizData.length+"</div>";
}
}

}

loadQuiz();

</script>

</body>
</html>
